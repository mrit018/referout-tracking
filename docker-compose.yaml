services:
  bms-dashboard:
    build: .
    container_name: bms-session-demo-dashboard
    ports:
      - "3080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
